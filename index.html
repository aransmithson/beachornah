<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beach or Nah</title>

  <!-- 🏖️ Beach emoji favicon via SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏖️</text></svg>">

  <!-- PWA manifest injected as Blob URL by JS below -->
  <meta name="theme-color" content="#87CEEB" id="theme-color-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Beach or Nah">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@400;600&display=swap');

    :root {
      --bg-sky-top: #87CEEB;
      --bg-sky-mid: #BEE7E8;
      --bg-sand: #F6E7C1;
      --card-bg: rgba(255,255,255,0.15);
      --card-border: rgba(255,255,255,0.2);
      --content-bg: white;
      --text-primary: #2c3e50;
      --text-secondary: #7f8c8d;
      --text-muted: #95a5a6;
      --divider: #ecf0f1;
      --shadow: rgba(0,0,0,0.3);
      --btn-bg: rgba(255,255,255,0.25);
      --btn-hover: rgba(255,255,255,0.35);
      --weather-bg: #f0f8ff;
      --weather-border: #ddeeff;
      --tide-label: #64748b;
    }

    [data-theme="dark"] {
      --bg-sky-top: #0d1b2a;
      --bg-sky-mid: #1b2d42;
      --bg-sand: #2a2318;
      --card-bg: rgba(255,255,255,0.07);
      --card-border: rgba(255,255,255,0.1);
      --content-bg: #1e2a38;
      --text-primary: #e8f4fd;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --divider: #2d3748;
      --shadow: rgba(0,0,0,0.6);
      --btn-bg: rgba(255,255,255,0.1);
      --btn-hover: rgba(255,255,255,0.18);
      --weather-bg: rgba(255,255,255,0.05);
      --weather-border: rgba(255,255,255,0.08);
      --tide-label: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, var(--bg-sky-top) 0%, var(--bg-sky-mid) 45%, var(--bg-sand) 100%);
      position: relative;
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1), transparent 45%);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.6) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px);
      background-size: 200px 200px, 150px 150px, 100px 100px;
      background-position: 0 0, 80px 60px, 40px 120px;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 0;
      pointer-events: none;
    }

    [data-theme="dark"] body::after { opacity: 1; }

    .container { position: relative; z-index: 1; width: 90%; max-width: 440px; padding: 20px 0 80px; }
    .card { background: var(--card-bg); backdrop-filter: blur(20px); border-radius: 32px; padding: 32px 28px; box-shadow: 0 20px 60px var(--shadow); border: 1px solid var(--card-border); }
    .header { display: flex; justify-content: space-between; margin-bottom: 28px; }
    .title-wrapper { display: flex; align-items: center; gap: 12px; }
    .emoji-icon { font-size: 42px; }
    h1 { font-family: 'Fredoka', sans-serif; font-size: 32px; font-weight: 700; color: white; }
    .content { background: var(--content-bg); border-radius: 24px; padding: 28px 20px; }
    .loading, .error { text-align: center; padding: 40px 20px; }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="title-wrapper">
          <div class="emoji-icon">🏖️</div>
          <h1>Beach or Nah</h1>
        </div>
      </div>
      <div class="content" id="content">
        <div class="loading">Finding your nearest tide station...</div>
      </div>
    </div>
  </div>

<script>
const OWM_BASE = 'https://api.open-meteo.com/v1/forecast';

let lastUpdateTime = null;
let tideRatePerMinute = 0;
let lastMeasuredValue = 0;

/* ✅ PROXY FETCH */
async function eaFetch(path) {
  const base = "https://environment.data.gov.uk/flood-monitoring";
  const target = base + path;
  const res = await fetch(`/api?url=${encodeURIComponent(target)}`);
  if (!res.ok) throw new Error("EA proxy request failed");
  return res.json();
}

/* UPDATED FUNCTIONS */
async function findNearestTideStation(lat, lon) {
  const data = await eaFetch("/id/stations?parameter=level&type=TideGauge&_limit=500");
  if (!data.items?.length) throw new Error('No tide stations found');
  let nearest = null, minDist = Infinity;
  data.items.forEach(s => {
    if (s.lat && s.long) {
      const d = Math.hypot(lat - s.lat, lon - s.long);
      if (d < minDist) { minDist = d; nearest = s; }
    }
  });
  return nearest;
}

async function getTideReading(id) {
  const data = await eaFetch(`/id/stations/${id}/readings?_sorted&_limit=1`);
  if (!data.items?.length) throw new Error('No readings available');
  return data.items[0];
}

async function getTideTrend(id) {
  try {
    const data = await eaFetch(`/id/stations/${id}/readings?_sorted&_limit=10`);
    if (!data.items || data.items.length < 2)
      return { direction: 'stable', ratePerMinute: 0 };

    let totalChange = 0, totalMins = 0;
    for (let i = 0; i < Math.min(5, data.items.length - 1); i++) {
      totalChange += data.items[i].value - data.items[i+1].value;
      totalMins += (new Date(data.items[i].dateTime) - new Date(data.items[i+1].dateTime)) / 60000;
    }

    const rate = totalMins > 0 ? totalChange / totalMins : 0;
    return {
      direction: rate > 0.001 ? 'rising' : rate < -0.001 ? 'falling' : 'stable',
      ratePerMinute: rate
    };
  } catch {
    return { direction: 'unknown', ratePerMinute: 0 };
  }
}

window.addEventListener('load', async () => {
  try {
    navigator.geolocation.getCurrentPosition(async pos => {
      const station = await findNearestTideStation(pos.coords.latitude, pos.coords.longitude);
      const reading = await getTideReading(station.notation);
      document.getElementById('content').innerHTML =
        `<h2>${reading.value.toFixed(2)} m</h2><p>${station.label}</p>`;
    });
  } catch {
    document.getElementById('content').innerHTML =
      `<div class="error">Unable to load tide data.</div>`;
  }
});
</script>

</body>
</html>
